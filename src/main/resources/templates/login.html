<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartBuy - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        h1 { text-align: center; color: #2d6a4f; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: #555; }
        input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 1rem; font-size: 1rem; }
        button { width: 100%; padding: 0.75rem; background: #2d6a4f; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1b4332; }
        .msg { background: #d4edda; color: #155724; padding: 0.6rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
        .erro { background: #f8d7da; color: #721c24; padding: 0.6rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .link a { color: #2d6a4f; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🛒 SmartBuy</h1>

    <div class="msg" th:if="${msg}" th:text="${msg}"></div>
    <div class="erro" th:if="${erro}" th:text="${erro}"></div>

    <form th:action="@{/login}" method="post">
        <label>E-mail</label>
        <input type="email" name="username" placeholder="seu@email.com" required />

        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" required />

        <button type="submit">Entrar</button>
    </form>

    <div class="link">
        Não tem conta? <a th:href="@{/cadastro}">Cadastre-se</a>
    </div>
</div>
</body>
</html>
