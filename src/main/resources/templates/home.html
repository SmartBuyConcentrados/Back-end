<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>SmartBuy - Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        nav { background: #2d6a4f; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h1 { color: white; font-size: 1.3rem; }
        nav a { color: #b7e4c7; text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: white; }
        .container { max-width: 800px; margin: 3rem auto; padding: 0 1rem; text-align: center; }
        .container h2 { color: #2d6a4f; margin-bottom: 1rem; }
        .container p { color: #555; }
    </style>
</head>
<body>

<nav>
    <h1>🛒 SmartBuy</h1>
    <span>
        Olá, <strong sec:authentication="name" style="color:white"></strong> &nbsp;|&nbsp;
        <a th:href="@{/logout}">Sair</a>
    </span>
</nav>

<div class="container">
    <h2>Bem-vindo ao SmartBuy!</h2>
    <p>Seu sistema de lista de pedidos e preços está pronto para uso.</p>
</div>

</body>
</html>
